<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Livros</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .button {
            display: inline-block;
            padding: 10px 15px;
            margin: 5px 0;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .action-link {
            margin-right: 10px;
            color: #007bff;
            text-decoration: none;
        }
    </style>
</head>
<body>

<h1>Lista de Livros Cadastrados</h1>

<a class="button" href="/cadastro">Cadastrar Novo Livro</a>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Título</th>
        <th>Autor</th>
        <th>Ano de Publicação</th>
        <th>Ações</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="livro : ${livros}">
        <td th:text="${livro.id}">1</td>
        <td th:text="${livro.titulo}">Título do Livro</td>
        <td th:text="${livro.autor}">Nome do Autor</td>
        <td th:text="${livro.anoPublicacao}">2023</td>
        <td>
            <a class="action-link"
               th:href="@{/livros/editar/{id}(id=${livro.id})}"
            >Editar</a>

            <a class="action-link"
               th:href="@{/livros/remover/{id}(id=${livro.id})}"
               onclick="return confirm('Tem certeza que deseja remover este livro?')"
            >Remover</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
