<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Livro</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #333; }
        form div { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button[type="submit"] {
            background-color: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .error-message { color: red; margin-bottom: 15px; }
    </style>
</head>
<body>

<form th:action="@{/livros}" th:object="${livro}" method="post">

    <input type="hidden" th:field="*{id}">

    <h1><span th:text="*{id} != null ? 'Editar Livro' : 'Cadastrar Novo Livro'">Cadastrar Novo Livro</span></h1>

    <div th:if="${errorMessage}" class="error-message">
        <p th:text="${errorMessage}"></p>
    </div>

    <div>
        <label for="titulo">Título:</label>
        <input type="text" id="titulo" th:field="*{titulo}" required>
    </div>

    <div>
        <label for="autor">Autor:</label>
        <input type="text" id="autor" th:field="*{autor}" required>
    </div>

    <div>
        <label for="anoPublicacao">Ano de Publicação:</label>
        <input type="number" id="anoPublicacao" th:field="*{anoPublicacao}" required min="1000" max="9999">
    </div>

    <button type="submit" th:text="*{id} != null} ? 'Salvar Alterações' : 'Cadastrar'"></button>

    <a href="/" class="button" style="background-color: #6c757d;">Cancelar</a>

</form>

</body>
</html>
