<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Livraria - Lista de Usuários</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f9fafb; }
        h1 { color: #111827; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
        a, button { padding: 6px 12px; border: none; cursor: pointer; border-radius: 6px; }
        .remover { background: #E11D48; color: white; }
        form { margin-bottom: 20px; }
        input[type="text"] { padding: 6px; border-radius: 4px; border: 1px solid #ccc; }
        button[type="submit"] { background: #3B82F6; color: white; border: none; border-radius: 4px; padding: 6px 12px; }
    </style>
</head>
<body>

<h1>👥 Usuários Cadastrados</h1>

<form th:action="@{/usuarios}" method="get">
    <input type="text" name="busca" th:value="${busca}" placeholder="Buscar usuário...">
    <button type="submit">Buscar</button>
</form>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Nome de Usuário</th>
        <th>Nome Completo</th>
        <th>Nascimento</th>
        <th>Email</th>
        <th>Senha</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="usuario : ${usuarios}">
        <td th:text="${usuario.id}"></td>
        <td th:text="${usuario.nomeUsuario}"></td>
        <td th:text="${usuario.nomeCompleto}"></td>
        <td th:text="${usuario.nascimento}"></td>
        <td th:text="${usuario.email}"></td>
        <td th:text="${usuario.senha}"></td>
    </tr>
    </tbody>
</table>

</body>
</html>
