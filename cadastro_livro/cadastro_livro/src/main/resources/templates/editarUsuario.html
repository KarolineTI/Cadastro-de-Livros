<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Editar Usuário</title>
    <style>
        /* === RESET GERAL === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* === CORPO E FUNDO === */
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            background-color: #111;
            color: #f5f5f5;
            position: relative;
            overflow: hidden;
        }

        /* Fundo com leve textura */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("pngwing.com (4).png") center/cover no-repeat;
            opacity: 0.15;
            z-index: -1;
        }

        /* === CONTAINER PRINCIPAL === */
        .login-container {
            width: 950px;
            height: 500px;
            display: flex;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
            background-color: #1a1a1a;
        }

        /* === LADO ESQUERDO (imagem / logo) === */
        .login-left {
            flex: 1;
            background: linear-gradient(135deg, #1e3d37, #2a5b52);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-left img {
            max-width: 80%;
            height: auto;
            border-radius: 12px;
        }

        /* === LADO DIREITO (formulário) === */
        .login-right {
            flex: 1;
            background-color: #222;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: #e8e8e8;
            position: relative;
        }

        .login-content {
            width: 80%;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .login-right h2 {
            font-size: 28px;
            margin-bottom: 25px;
            color: #a9b5ab;
        }

        /* === FORMULÁRIOS === */
        .login-right form {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .login-right input {
            padding: 14px;
            margin-bottom: 18px;
            border: 1px solid #333;
            border-radius: 10px;
            background-color: #2b2b2b;
            color: #fff;
            font-size: 16px;
            transition: border 0.3s, background 0.3s;
            width: 100%;
            box-sizing: border-box;
        }

        .login-right input:focus {
            border-color: #a9b5ab;
            background-color: #303b35;
            outline: none;
        }

        /* === BOTÕES === */
        .login-right button {
            padding: 14px;
            background-color: #a9b5ab;
            color: #1a1a1a;
            font-size: 17px;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
        }

        .login-right button:hover {
            background-color: #c7d2ca;
            transform: scale(1.03);
        }

        /* === IMAGEM DE FUNDO ADICIONAL === */
        .imagem-fundo {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('/img/pngwing.com (3).png');
            background-size: cover;
            background-position: center;
            opacity: 0.2;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="imagem-fundo"></div>

<div class="login-container">
    <div class="login-left">

    </div>

    <div class="login-right">
        <div class="login-content">
            <h2 id="form-title">Editar Usuário</h2>

            <form id="cadastro-form" action="/salvar-usuario" method="post">
                <input type="hidden" name="id" th:value="${usuario.id}">
                <input type="text" id="nome" name="nomeUsuario" placeholder="Nome de usuário" th:value="${usuario.nomeUsuario}" required>
                <input type="text" id="nomeCompleto" name="nomeCompleto" placeholder="Nome completo" th:value="${usuario.nomeCompleto}" required>
                <input type="text" id="nascimento" name="nascimento" placeholder="nascimento" th:value="${usuario.nascimento}" required>
                <input type="email" id="emailCadastro" name="email" placeholder="Email" th:value="${usuario.email}" required>
                <input type="password" id="senhaCadastro" name="senha" placeholder="Senha" th:value="${usuario.senha}" required>
                <button type="submit">Salvar Mudança</button>
            </form>

        </div>
    </div>
</div>

</body>
</html>
